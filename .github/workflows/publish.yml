# Publishes @rendobar/n8n-nodes-rendobar to npm on every version tag push.
#
# Auth: npm Trusted Publisher (OIDC). No NPM_TOKEN secret needed.
# Configured at npmjs.com → @rendobar/n8n-nodes-rendobar → Settings → Trusted
# Publisher (repo: rendobar/n8n-nodes-rendobar, workflow: publish.yml).
#
# Why OIDC (matches @rendobar/sdk and @rendobar/mcp):
#   - No long-lived secret to store, rotate, or leak.
#   - Satisfies npm's 2FA-on-writes requirement (a token hits EOTP; OIDC doesn't).
#   - Auto-enables npm provenance — required for n8n verified community nodes
#     since 2026-05-01. Provenance works here because this repository is public.
#
# Requires @n8n/node-cli ≥ 0.23.0 (provenance support) and npm ≥ 11.5 (OIDC
# trusted publisher support — installed in the workflow below).
#
# ─── RELEASE PROCESS ───────────────────────────────────────────────────────────
# Run `npm run release` locally to bump the version interactively, update the
# changelog, commit, tag, and push. The pushed tag triggers this workflow, which
# (detecting GITHUB_ACTIONS) lints, builds, and publishes with provenance.

name: Publish

on:
  push:
    tags:
      # Matches 0.1.0, 1.2.3, v0.2.0, etc.
      - '*.*.*'

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    permissions:
      id-token: write   # OIDC for npm Trusted Publisher + provenance
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          # No registry-url: setting it writes an _authToken placeholder to
          # ~/.npmrc that overrides OIDC trusted-publisher auth and 404s the
          # publish. The registry is configured manually below.
          cache: 'npm'

      - name: Configure npm registry (OIDC — no auth token)
        run: |
          echo "registry=https://registry.npmjs.org/" > ~/.npmrc
          echo "always-auth=false" >> ~/.npmrc

      - name: Upgrade npm for OIDC trusted publisher support (requires 11.5+)
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Release (OIDC trusted publisher + provenance)
        # In CI, `n8n-node release` lints, builds, then runs
        # `npm publish --provenance`. With the OIDC npmrc above and npm 11.5+,
        # the publish authenticates via the trusted publisher — no token.
        run: npm run release
